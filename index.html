<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Uncert | Free AI Training | Founded by Ram Srinivasan</title>
<style>
  :root {
    --bg:        #F6F3EC;
    --surface:   #FFFFFF;
    --ink:       #0E1A2B;
    --ink-2:     #4B4B4B;
    --ink-3:     #8A8378;
    --line:      #E1DDD3;
    --line-2:    #EFEBE2;
    --accent:    #1A3A6E;
    --accent-2:  #E8EDF5;
    --gold:      #A6803E;
    --gold-2:    #D7B88A;
    --success:   #2C5F3F;
    --success-bg:#EBF1EC;
    --error:     #7C2D29;
    --error-bg:  #F5E9E8;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --script: "Apple Chancery", "Snell Roundhand", "Lucida Handwriting", "Brush Script MT", cursive;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: var(--accent); color: #fff; }

  .topbar {
    background: var(--ink);
    color: #fff;
    padding: 10px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .topbar .gold { color: #D7B88A; }

  #app {
    max-width: 920px;
    margin: 0 auto;
    background: var(--surface);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    min-height: calc(100vh - 36px - 60px);
  }

  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .serif { font-family: var(--serif); font-weight: 400; }
  .display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .rule { height: 1px; background: var(--line); border: 0; margin: 20px 0; }
  .rule-thin { height: 1px; background: var(--line-2); border: 0; margin: 14px 0; }
  .rule-accent { height: 2px; width: 36px; background: var(--ink); border: 0; margin: 0 0 18px 0; }

  button { font: inherit; color: inherit; cursor: pointer; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 22px;
    border-radius: 2px;
    border: 1px solid var(--ink);
    background: var(--ink); color: #fff;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s, border-color .15s;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-gold {
    border-color: var(--gold);
    background: var(--gold);
    color: #fff;
  }
  .btn-gold:hover { background: #B6925A; border-color: #B6925A; }
  .btn-ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--ink); background: transparent; color: var(--ink); }
  .btn-text {
    background: transparent; border: 0; padding: 6px 0;
    color: var(--ink-2); font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
  }
  .btn-text:hover { color: var(--accent); }

  .pill {
    display: inline-block;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px;
    background: var(--accent-2); color: var(--accent);
    font-weight: 600;
  }
  .pill-muted   { background: var(--line-2); color: var(--ink-2); }
  .pill-success { background: var(--success-bg); color: var(--success); }
  .pill-gold    { background: rgba(166,128,62,0.10); color: var(--gold); }

  .opt {
    width: 100%; text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    padding: 16px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14.5px;
  }
  .opt:hover { border-color: var(--ink-2); border-left-color: var(--ink); }
  .opt.is-selected { border-left-color: var(--accent); background: #FBFAF6; }
  .opt.is-correct  { border-left-color: var(--success); background: var(--success-bg); }
  .opt.is-wrong    { border-left-color: var(--error);   background: var(--error-bg); }
  .opt .opt-num {
    font-family: var(--serif);
    color: var(--ink-3);
    font-size: 12px;
    letter-spacing: 0.12em;
    margin-right: 12px;
  }

  .feedback {
    border-left: 3px solid var(--ink);
    padding: 14px 18px;
    background: #FBFAF6;
    margin-top: 18px;
    font-size: 14px;
    line-height: 1.65;
  }
  .feedback.is-correct { border-left-color: var(--success); background: var(--success-bg); color: #1F3F2A; }
  .feedback.is-wrong   { border-left-color: var(--error);   background: var(--error-bg);   color: #4A1A17; }
  .feedback .label {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 6px; display: block;
  }

  .mod-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 18px; align-items: center;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s;
  }
  .mod-row:hover { background: #FBFAF6; }
  .mod-row.is-locked { cursor: not-allowed; opacity: 0.45; }
  .mod-row.is-locked:hover { background: transparent; }
  .mod-row .mod-num {
    font-family: var(--serif);
    font-size: 30px;
    color: var(--ink);
    font-weight: 400;
    line-height: 1;
  }
  .mod-row .mod-title {
    font-family: var(--serif);
    font-size: 21px;
    color: var(--ink);
    line-height: 1.25;
    margin: 0 0 4px 0;
    letter-spacing: -0.005em;
  }
  .mod-row .mod-sub { font-size: 13px; color: var(--ink-2); }
  .mod-row .mod-meta {
    text-align: right;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .match-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px; }
  .match-col-label {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 10px;
  }
  .match-item {
    display: block; width: 100%; text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 13.5px;
    transition: all .15s;
    color: var(--ink);
  }
  .match-item:hover { border-color: var(--ink-2); }
  .match-item.is-active { border-left-color: var(--accent); background: var(--accent-2); }
  .match-item.is-done   { border-left-color: var(--success); background: var(--success-bg); color: var(--success); cursor: default; }
  .match-mono {
    display: inline-block; width: 22px; height: 22px;
    border: 1px solid var(--ink); border-radius: 50%;
    text-align: center; line-height: 20px;
    font-family: var(--serif); font-size: 12px;
    margin-right: 10px; vertical-align: middle;
    color: var(--ink); background: transparent;
  }
  .match-item.is-done .match-mono { border-color: var(--success); color: var(--success); }

  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .compare-card {
    border: 1px solid var(--line);
    border-top: 3px solid var(--line);
    padding: 18px 18px 20px;
    border-radius: 2px;
    background: var(--surface);
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    color: var(--ink);
  }
  .compare-card:hover { border-color: var(--ink-2); }
  .compare-card.is-correct { border-top-color: var(--success); background: var(--success-bg); }
  .compare-card.is-wrong   { border-top-color: var(--error);   background: var(--error-bg); }
  .compare-card .opt-tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 10px;
  }
  .compare-card .body { font-family: var(--serif); font-size: 15px; line-height: 1.55; color: var(--ink); }

  .scenario {
    border-left: 3px solid var(--gold);
    padding: 12px 18px;
    background: #FBF7EE;
    font-family: var(--serif);
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    line-height: 1.6;
    margin: 18px 0;
  }

  .tech-row { border-bottom: 1px solid var(--line); padding: 18px 0; cursor: pointer; transition: background .15s; }
  .tech-row:hover { background: #FBFAF6; }
  .tech-row.is-open { cursor: default; }
  .tech-row .tech-head { display: flex; align-items: baseline; gap: 14px; }
  .tech-row .tech-num { font-family: var(--serif); color: var(--ink-3); font-size: 13px; letter-spacing: 0.1em; min-width: 28px; }
  .tech-row .tech-title { font-family: var(--serif); font-size: 18px; color: var(--ink); flex: 1; }
  .tech-row .tech-tap { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
  .tech-row .tech-body { padding-top: 12px; padding-left: 42px; }
  .tech-row .tech-example {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; color: var(--accent);
    background: #FBFAF6; border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 2px; margin-bottom: 10px;
    line-height: 1.55;
  }
  .tech-row .tech-why { font-size: 14px; color: var(--ink-2); line-height: 1.6; }

  .issue {
    padding: 10px 14px; border: 1px solid var(--error); border-left-width: 3px;
    background: var(--error-bg); color: var(--error);
    border-radius: 2px; margin-bottom: 8px; font-size: 13.5px;
  }
  .fixed {
    padding: 14px 18px; border: 1px solid var(--success); border-left-width: 3px;
    background: var(--success-bg); color: #1F3F2A;
    border-radius: 2px;
    font-family: var(--serif); font-size: 15px; line-height: 1.6;
  }

  .build-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .build-card {
    border: 1px solid var(--line);
    padding: 18px 18px;
    border-radius: 2px;
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    color: var(--ink);
  }
  .build-card:hover { border-color: var(--ink-2); }
  .build-card.is-selected { border-color: var(--accent); border-left: 3px solid var(--accent); background: #FBFAF6; }
  .build-card .build-tier { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 8px; }
  .build-card .build-name { font-family: var(--serif); font-size: 16px; color: var(--ink); margin-bottom: 6px; }
  .build-card .build-tool { font-size: 12px; color: var(--ink-2); }

  textarea.prompt-input {
    width: 100%; min-height: 110px;
    border: 1px solid var(--line); border-radius: 2px;
    padding: 12px 14px;
    font-family: var(--serif); font-size: 14.5px; line-height: 1.55;
    color: var(--ink); background: var(--surface);
    resize: vertical;
  }
  textarea.prompt-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  .pad { padding: 36px 48px; }
  .pad-tight { padding: 24px 48px; }
  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 14px 48px;
    background: #FBFAF6;
  }
  .progress-row .stat .num { font-family: var(--serif); font-size: 22px; color: var(--ink); line-height: 1; }
  .progress-row .stat .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; font-weight: 700; }
  .progress-bar { flex: 1; max-width: 280px; margin: 0 24px; height: 4px; background: var(--line); border-radius: 0; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: var(--ink); transition: width .6s ease; }

  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 12px 24px; border-radius: 2px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    z-index: 100;
    animation: pop .35s ease;
    box-shadow: 0 8px 24px rgba(14,26,43,.25);
  }
  @keyframes pop { from { transform: translate(-50%, -8px); opacity: 0;} to {transform: translate(-50%, 0); opacity: 1;} }

  .colophon {
    text-align: center; color: var(--ink-3);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 20px 14px;
  }
  .colophon a { color: var(--ink-2); text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 1px; }
  .colophon a:hover { color: var(--ink); border-bottom-color: var(--ink); }

  .providers {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 28px;
    max-width: 540px; margin: 28px auto 0;
  }
  .providers .p { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line); }
  .providers .mono {
    width: 28px; height: 28px; border: 1px solid var(--ink); border-radius: 50%;
    text-align: center; line-height: 26px;
    font-family: var(--serif); font-size: 14px; color: var(--ink);
  }
  .providers .label { text-align: left; }
  .providers .name { font-family: var(--serif); font-size: 14px; color: var(--ink); line-height: 1.2; }
  .providers .desc { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; }

  .quest-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 48px;
    border-bottom: 1px solid var(--line);
    background: #FBFAF6;
  }
  .quest-head .crumb { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .quest-head .crumb b { color: var(--ink); font-weight: 600; }

  .faculty {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    border-left: 2px solid var(--line);
    padding-left: 18px;
    margin: 0 0 22px 0;
  }
  .faculty:before {
    content: "Scenario";
    display: block;
    font-family: var(--sans);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 6px;
  }

  .question-line {
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 18px 0;
    letter-spacing: -0.005em;
  }

  .distinctions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Capstone CTA */
  .capstone-cta {
    margin: 28px 48px 8px;
    padding: 24px 28px;
    border: 1px solid var(--gold);
    border-left: 4px solid var(--gold);
    background: #FBF7EE;
    border-radius: 2px;
    display: flex; gap: 18px; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
  }
  .capstone-cta .ct-text {
    flex: 1; min-width: 260px;
  }
  .capstone-cta .ct-eyebrow {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 6px;
  }
  .capstone-cta .ct-title { font-family: var(--serif); font-size: 20px; color: var(--ink); margin-bottom: 4px; }
  .capstone-cta .ct-desc { font-size: 13px; color: var(--ink-2); }

  /* Claim form */
  .claim-form { max-width: 520px; margin: 0 auto; padding: 8px 0; }
  .claim-field { margin-bottom: 18px; }
  .claim-label {
    display: block; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 8px;
  }
  .claim-input {
    width: 100%;
    border: 1px solid var(--line); border-bottom: 1px solid var(--ink);
    border-radius: 0;
    padding: 10px 0;
    font-family: var(--serif); font-size: 22px;
    color: var(--ink); background: transparent;
    transition: border-color .15s;
  }
  .claim-input:focus { outline: none; border-bottom-color: var(--accent); }
  .claim-input.is-small { font-size: 16px; }

  /* ============== CERTIFICATE ============== */
  .cert-screen {
    padding: 32px 48px 56px;
    background: var(--bg);
  }
  .cert-actions {
    display: flex; justify-content: space-between; gap: 12px;
    margin: 20px 0 0;
    flex-wrap: wrap;
  }
  .cert-frame {
    background: #FCFAF3;
    background-image:
      radial-gradient(circle at 50% 0%, rgba(166,128,62,0.05), transparent 60%),
      radial-gradient(circle at 50% 100%, rgba(26,58,110,0.04), transparent 60%);
    border: 2px solid var(--ink);
    padding: 14px;
    text-align: center;
    position: relative;
    box-shadow: 0 14px 50px rgba(14,26,43,0.18);
    color: var(--ink);
    aspect-ratio: 11 / 8.5;
  }
  .cert-band {
    border: 4px solid var(--gold);
    padding: 6px;
    height: 100%;
  }
  .cert-inner {
    border: 1px solid var(--ink);
    padding: 38px 48px 36px;
    height: 100%;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative;
    gap: 12px;
  }
  .cert-corner {
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--gold);
    border-style: solid;
    border-width: 0;
  }
  .cert-corner.tl { top: -1px; left: -1px; border-top-width: 2px; border-left-width: 2px; }
  .cert-corner.tr { top: -1px; right: -1px; border-top-width: 2px; border-right-width: 2px; }
  .cert-corner.bl { bottom: -1px; left: -1px; border-bottom-width: 2px; border-left-width: 2px; }
  .cert-corner.br { bottom: -1px; right: -1px; border-bottom-width: 2px; border-right-width: 2px; }
  .cert-flourish {
    text-align: center;
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 1.2em;
    margin: 12px 0 4px;
    padding-left: 1.2em;
  }
  .cert-mid { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .cert-top {
    display: flex; flex-direction: column; align-items: center;
  }
  .cert-monogram {
    width: 64px; height: 64px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 30px;
    font-weight: 500;
    color: var(--ink);
    margin: 0 auto 14px;
    letter-spacing: -0.02em;
    position: relative;
  }
  .cert-monogram::after {
    content: "";
    position: absolute; inset: 4px;
    border: 1px solid var(--gold);
    border-radius: 50%;
  }
  .cert-academy {
    font-size: 13px; letter-spacing: 0.36em; text-transform: uppercase;
    color: var(--ink); font-weight: 600;
  }
  .cert-tagline {
    font-family: var(--serif); font-style: italic;
    font-size: 13px; color: var(--ink-2);
    margin-top: 4px;
  }
  .cert-academy-rule {
    width: 72px; height: 1px; background: var(--gold);
    margin: 14px auto 0;
  }
  .cert-mid { margin-top: 6px; }
  .cert-this-certifies {
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-2); font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .cert-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 52px;
    color: var(--accent);
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .cert-title-line {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--ink-2);
    font-style: italic;
    margin: 0 0 14px;
    min-height: 18px;
  }
  .cert-name-rule {
    width: 60%; height: 1px; background: var(--ink);
    margin: 6px auto 18px;
    opacity: 0.4;
  }
  .cert-completed {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-2); font-weight: 600;
    margin-bottom: 12px;
  }
  .cert-program {
    font-family: var(--serif);
    font-size: 36px;
    color: var(--ink);
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin: 0 0 12px;
  }
  .cert-desc {
    font-family: var(--serif);
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.55;
    max-width: 580px;
    margin: 0 auto;
    font-style: italic;
  }
  .cert-foot {
    display: grid;
    grid-template-columns: 1.1fr auto 1.1fr;
    gap: 20px;
    align-items: end;
    margin-top: 24px;
  }
  .cert-foot-col {
    text-align: center;
  }
  .cert-foot-col.left  { text-align: left; }

/* --------------- DOM HELPER --------------- */
const $app = document.getElementById("app");
function el(tag, attrs, children) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "style" && typeof v === "object") Object.assign(n.style, v);
    else if (k === "class") n.className = v;
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "disabled") { if (v) n.setAttribute("disabled", ""); }
    else n.setAttribute(k, v);
  }
  if (children != null) {
    const arr = Array.isArray(children) ? children : [children];
    for (const c of arr) {
      if (c == null || c === false) continue;
      n.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
    }
  }
  return n;
}

/* Per-page-load random seed for shuffling — stable within a session */
const SHUFFLE_SEED = Math.floor(Math.random() * 1e9);
function seededShuffleOrder(n, seed) {
  let h = (seed >>> 0) || 1;
  const rand = function() {
    h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
    return (h >>> 0) / 4294967296;
  };
  const order = [];
  for (let i = 0; i < n; i++) order.push(i);
  for (let i = n - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    const t = order[i]; order[i] = order[j]; order[j] = t;
  }
  // Ensure not the identity shuffle
  let identity = true;
  for (let i = 0; i < n; i++) if (order[i] !== i) { identity = false; break; }
  if (identity && n >= 2) { const t = order[0]; order[0] = order[1]; order[1] = t; }
  return order;
}

function strHash(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return h;
}

function r_match(session, onComplete) {
  const t = getTransient(session.id);
  const matched = t.matched || {};
  const sel = t.selected || null;
  const all = Object.keys(matched).length === session.pairs.length;

  // Compute / cache the right-column shuffle order for this session
  if (!t.strengthOrder || t.strengthOrder.length !== session.pairs.length) {
    const seed = (SHUFFLE_SEED ^ strHash(session.id)) >>> 0;
    state.transient[session.id] = Object.assign({}, t, {
      strengthOrder: seededShuffleOrder(session.pairs.length, seed)
    });
  }
  const order = state.transient[session.id].strengthOrder;
  const shuffledStrengths = order.map(function(i){ return session.pairs[i]; });

  const handleA = function(ally){ if (matched[ally]) return; setTransient(session.id, { selected: ally }); };
  const handleS = function(strength){
    if (!sel) return;
    const ok = (session.pairs.find(function(p){ return p.ally === sel; }) || {}).strength === strength;
    if (ok) {
      const next = Object.assign({}, matched); next[sel] = strength;
      setTransient(session.id, { matched: next, selected: null });
    } else {
      setTransient(session.id, { selected: null });
    }
  };

  const allyCol = el("div", null, [
    el("div", { class: "match-col-label" }, "Provider")
  ].concat(session.pairs.map(function(p){
    const done = !!matched[p.ally];
    let cls = "match-item";
    if (sel === p.ally) cls += " is-active";
    if (done) cls += " is-done";
    return el("button", { class: cls, onclick: function(){ handleA(p.ally); } }, [
      el("span", { class: "match-mono" }, p.mono),
      document.createTextNode(p.ally + (done ? "  ·  matched" : ""))
    ]);
  })));

  const strCol = el("div", null, [
    el("div", { class: "match-col-label" }, "May 2026 flagship & positioning")
  ].concat(shuffledStrengths.map(function(p){
    const done = Object.keys(matched).some(function(k){ return matched[k] === p.strength; });
    let cls = "match-item" + (done ? " is-done" : "");
    return el("button", { class: cls, onclick: function(){ handleS(p.strength); } }, p.strength + (done ? "  ·  matched" : ""));
  })));

  const children = [
    el("p", { class: "faculty" }, session.story),
    el("p", { class: "question-line" }, session.question),
    el("div", { class: "match-grid" }, [allyCol, strCol])
  ];
  if (sel) children.push(el("p", { class: "eyebrow", style: { marginTop: "12px" } }, "Now select the matching item for " + sel));
  if (all) children.push(el("div", { style: { marginTop: "20px" } },
    el("button", { class: "btn", onclick: onComplete }, "Continue →")
  ));
  return el("div", null, children);
}

  const children = [
    el("p", { class: "faculty" }, session.story),
    el("div", { class: "feedback", style: { borderLeftColor: "var(--accent)", background: "#FBFAF6" } }, [
      el("span", { class: "label", style: { color: "var(--accent)" } }, session.exerciseLabel || "The exercise"),
      el("div", { style: { fontFamily: "var(--serif)", fontSize: "15px", lineHeight: 1.55 } }, session.brief)
    ]),
    el("div", { class: "match-col-label", style: { marginTop: "16px", marginBottom: "8px" } }, "Address each of the following"),
    el("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "16px" } },
      session.rubricItems.map(function(r){ return el("span", { class: "pill pill-muted" }, r); }))
  ];

  if (!submitted) {
    const ta = el("textarea", { class: "prompt-input", placeholder: "Compose your response…", rows: 8 });
    ta.value = val;
    ta.addEventListener("input", function(e){
      state.transient[session.id] = Object.assign({}, state.transient[session.id] || {}, { val: e.target.value });
    });
    ta.style.minHeight = "180px";
    children.push(ta);
    children.push(el("div", { style: { marginTop: "12px" } },
      el("button", { class: "btn", onclick: function(){
        const v = (state.transient[session.id] && state.transient[session.id].val) || "";
        if (v.length > minLen) setTransient(session.id, { submitted: true });
      }}, "Submit response →")
    ));
    children.push(el("p", { class: "eyebrow", style: { marginTop: "8px", color: "var(--ink-3)" } },
      "Minimum " + minLen + " characters · the value is in the practice, not the grading"));
  } else {
    children.push(el("div", { class: "feedback is-correct" }, [
      el("span", { class: "label" }, "Your response"),
      el("div", { style: { fontFamily: "var(--serif)", fontSize: "15px", whiteSpace: "pre-wrap" } }, val)
    ]));
    children.push(el("div", { class: "feedback", style: { marginTop: "10px" } }, [
      el("span", { class: "label" }, "Faculty exemplar"),
      el("div", { style: { fontFamily: "var(--serif)", fontSize: "15px", lineHeight: 1.6 } }, session.sampleAnswer)
    ]));
    children.push(el("div", { style: { marginTop: "20px" } },
      el("button", { class: "btn", onclick: onComplete }, "Continue →")
    ));
  }
  return el("div", null, children);
}

function renderSessionView(session, onComplete) {
  switch (session.type) {
    case "choice":         return r_choice(session, onComplete);
    case "compare":        return r_compare(session, onComplete);
    case "learn":          return r_learn(session, onComplete);
    case "colosseum":      return r_colosseum(session, onComplete);
    case "boss":           return r_boss(session, onComplete);
    case "build":          return r_build(session, onComplete);
    case "match":          return r_match(session, onComplete);
    case "prompt_improve": return r_prompt_improve(session, onComplete);
    case "exercise":       return r_exercise(session, onComplete);
    default:               return el("div", null, "Unknown session type");
  }
}

/* --------------- GAME LOGIC --------------- */
function enterModule(idx) {
  if (idx > 0 && state.completedModules.indexOf(idx - 1) === -1) return;
  setState({ activeModuleIdx: idx, activeSessionIdx: 0, screen: "session" });
}

function completeSession() {
  const mod = MODULES[state.activeModuleIdx];
  const session = mod.sessions[state.activeSessionIdx];
  if (state.completedSessions.indexOf(session.id) === -1) {
    state.completedSessions.push(session.id);
  }
  delete state.transient[session.id];

  if (state.activeSessionIdx < mod.sessions.length - 1) {
    setState({ activeSessionIdx: state.activeSessionIdx + 1 });
  } else {
    if (state.completedModules.indexOf(state.activeModuleIdx) === -1) {
      state.completedModules.push(state.activeModuleIdx);
      const dist = mod.distinction;
      if (dist && state.distinctions.indexOf(dist) === -1) state.distinctions.push(dist);
      state.showToast = mod.title + " — module complete";
      setTimeout(function(){ state.showToast = null; render(); }, 2400);
    }
    setState({ screen: "index" });
  }
}

function formatIssueDate(iso) {
  const d = iso ? new Date(iso) : new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

function ordinal(n) {
  if (n >= 11 && n <= 13) return n + "th";
  const last = n % 10;
  if (last === 1) return n + "st";
  if (last === 2) return n + "nd";
  if (last === 3) return n + "rd";
  return n + "th";
}

function toRoman(num) {
  const map = [["M",1000],["CM",900],["D",500],["CD",400],["C",100],["XC",90],["L",50],["XL",40],["X",10],["IX",9],["V",5],["IV",4],["I",1]];
  let r = "";
  for (const [s, v] of map) { while (num >= v) { r += s; num -= v; } }
  return r;
}

function formatFormalDate(iso) {
  const d = iso ? new Date(iso) : new Date();
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return "the " + ordinal(d.getDate()) + " day of " + months[d.getMonth()] + ", " + toRoman(d.getFullYear());
}

function certificateId(name, isoDate) {
  const a = strHash((name || "") + "|a|" + (isoDate || ""));
  const b = strHash((isoDate || "") + "|b|" + (name || ""));
  const hex = (a.toString(16).padStart(8, "0") + b.toString(16).padStart(8, "0")).toUpperCase();
  return hex.slice(0, 4) + "-" + hex.slice(4, 8) + "-" + hex.slice(8, 12) + "-" + hex.slice(12, 16);
}

function issueCertificate() {
  const name = (state.claimDraft.name || "").trim();
  if (name.length < 2) return;
  const title = (state.claimDraft.title || "").trim();
  setState({
    recipientName: name,
    recipientTitle: title,
    issuedDate: new Date().toISOString().slice(0, 10),
    certificateClaimed: true,
    screen: "certificate"
  });
}

/* --------------- SCREENS --------------- */
function renderTitle() {
  const continuing = state.completedSessions.length > 0;

  const providers = el("div", { class: "providers" },
    PROVIDERS.map(function(p){
      return el("div", { class: "p" }, [
        el("div", { class: "mono" }, p.mono),
        el("div", { class: "label" }, [
          el("div", { class: "name" }, p.name),
          el("div", { class: "desc" }, p.desc)
        ])
      ]);
    })
  );

  return el("div", { class: "pad", style: { textAlign: "center", paddingTop: "64px", paddingBottom: "64px" } }, [
    el("div", { class: "eyebrow" }, BRAND + " · " + TAGLINE + " · May 2026"),
    el("hr", { class: "rule-accent", style: { margin: "16px auto 24px" } }),
    el("h1", { class: "display", style: { fontSize: "44px", margin: "0 0 12px 0", lineHeight: 1.15, letterSpacing: "-0.01em" } }, PROGRAM_TITLE),
    el("p", { style: { fontSize: "16px", color: "var(--ink-2)", maxWidth: "580px", margin: "0 auto 8px", lineHeight: 1.6 } },
      "An eleven-module program for senior leaders and consulting professionals on the strategy, architecture, economics, governance, and operationalization of agentic AI. Free, open-source, and certified on completion."),
    el("p", { class: "eyebrow", style: { marginTop: "20px" } }, "Featuring · Opus 4.7 · GPT-5.5 · Gemini 3.1 Pro · Copilot"),
    providers,
    el("div", { style: { marginTop: "40px", display: "flex", justifyContent: "center", gap: "12px", flexWrap: "wrap" } }, [
      el("button", { class: "btn", onclick: function(){ setState({ screen: "index" }); } },
        continuing ? "Resume program →" : "Begin program →"),
      state.certificateClaimed ? el("button", { class: "btn btn-gold", onclick: function(){ setState({ screen: "certificate" }); } }, "View certificate →") : null
    ]),
    el("p", { class: "eyebrow", style: { marginTop: "32px", color: "var(--ink-3)" } },
      continuing ? (state.completedSessions.length + " of " + TOTAL_SESSIONS + " sessions complete") : "Approximately two hours · self-paced · eleven modules · 41 sessions"),
    el("p", { class: "eyebrow", style: { marginTop: "8px", color: "var(--ink-3)" } }, ATTRIBUTION_PIPED)
  ]);
}

function renderIndex() {
  const container = el("div", null);

  if (state.showToast) {
    container.appendChild(el("div", { class: "toast" }, state.showToast));
  }

  const pct = Math.round((state.completedSessions.length / TOTAL_SESSIONS) * 100);
  const progress = el("div", { class: "progress-row" }, [
    el("div", { class: "stat" }, [
      el("div", { class: "num" }, state.completedModules.length + " / " + MODULES.length),
      el("div", { class: "lbl" }, "Modules complete")
    ]),
    el("div", { class: "progress-bar" }, el("div", { class: "fill", style: { width: pct + "%" } })),
    el("div", { class: "stat", style: { textAlign: "right" } }, [
      el("div", { class: "num" }, state.completedSessions.length + " / " + TOTAL_SESSIONS),
      el("div", { class: "lbl" }, "Sessions complete")
    ])
  ]);
  container.appendChild(progress);

  container.appendChild(el("div", { class: "pad-tight", style: { paddingBottom: "8px" } }, [
    el("div", { class: "eyebrow" }, "Program Index · Eleven Modules"),
    el("hr", { class: "rule-accent", style: { marginTop: "10px" } }),
    el("h2", { class: "display", style: { fontSize: "26px", margin: "0 0 6px 0" } }, PROGRAM_TITLE),
    el("p", { style: { color: "var(--ink-2)", margin: 0, fontSize: "14px" } },
      "Each module contains one to four sessions. Complete a module to unlock the next.")
  ]));

  // Capstone CTA when all modules complete
  const allComplete = state.completedModules.length === MODULES.length;
  if (allComplete) {
    const ctaButton = state.certificateClaimed
      ? el("button", { class: "btn btn-gold", onclick: function(){ setState({ screen: "certificate" }); } }, "View certificate →")
      : el("button", { class: "btn btn-gold", onclick: function(){ setState({ screen: "claim", claimDraft: { name: state.recipientName || "", title: state.recipientTitle || "" } }); } }, "Claim certificate →");
    container.appendChild(el("div", { class: "capstone-cta" }, [
      el("div", { class: "ct-text" }, [
        el("div", { class: "ct-eyebrow" }, "Program complete"),
        el("div", { class: "ct-title" }, state.certificateClaimed ? "Your certificate has been issued" : "You have completed every module"),
        el("div", { class: "ct-desc" }, state.certificateClaimed
          ? ("Issued to " + state.recipientName + " on " + formatIssueDate(state.issuedDate) + ".")
          : "Claim your official Certificate of Completion from " + BRAND + ", signed by " + FOUNDER + ".")
      ]),
      ctaButton
    ]));
  }

  // Module list
  const list = el("div", { class: "pad-tight", style: { paddingTop: "12px", paddingBottom: "12px" } });
  MODULES.forEach(function(m, i){
    const unlocked = i === 0 || state.completedModules.indexOf(i - 1) !== -1;
    const done = state.completedModules.indexOf(i) !== -1;
    const sessionsDone = m.sessions.filter(function(s){ return state.completedSessions.indexOf(s.id) !== -1; }).length;

    let metaPill;
    if (done) metaPill = el("span", { class: "pill pill-success" }, "Complete");
    else if (!unlocked) metaPill = el("span", { class: "pill pill-muted" }, "Locked");
    else if (sessionsDone > 0) metaPill = el("span", { class: "pill" }, sessionsDone + " of " + m.sessions.length + " done");
    else metaPill = el("span", { class: "pill pill-muted" }, "Available");

    const row = el("div", {
      class: "mod-row" + (unlocked ? "" : " is-locked"),
      onclick: function(){ if (unlocked) enterModule(i); }
    }, [
      el("div", { class: "mod-num" }, ROMAN[i]),
      el("div", null, [
        el("div", { class: "mod-title" }, m.title),
        el("div", { class: "mod-sub" }, m.subtitle)
      ]),
      el("div", { class: "mod-meta" }, [
        metaPill,
        el("div", { style: { marginTop: "6px" } }, m.sessions.length + " session" + (m.sessions.length === 1 ? "" : "s"))
      ])
    ]);
    list.appendChild(row);
  });
  container.appendChild(list);

  if (state.distinctions.length > 0) {
    container.appendChild(el("div", { class: "pad-tight", style: { paddingTop: "16px" } }, [
      el("div", { class: "eyebrow" }, "Distinctions earned"),
      el("hr", { class: "rule-thin" }),
      el("div", { class: "distinctions" },
        state.distinctions.map(function(d){ return el("span", { class: "pill pill-gold" }, d); }))
    ]));
  }

  container.appendChild(el("div", { class: "pad-tight", style: { display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "1px solid var(--line)", marginTop: "8px" } }, [
    el("button", { class: "btn-text", onclick: function(){ setState({ screen: "title" }); } }, "← Title"),
    el("button", { class: "btn-text", onclick: resetProgress, style: { color: "var(--ink-3)" } }, "Reset")
  ]));

  return container;
}

function renderClaim() {
  const draft = state.claimDraft || { name: "", title: "" };

  const nameInput = el("input", {
    class: "claim-input",
    type: "text",
    placeholder: "e.g., Jane M. Doe",
    maxlength: "80"
  });
  nameInput.value = draft.name || "";
  nameInput.addEventListener("input", function(e){
    state.claimDraft = Object.assign({}, state.claimDraft || {}, { name: e.target.value });
  });

  const titleInput = el("input", {
    class: "claim-input is-small",
    type: "text",
    placeholder: "e.g., Chief Technology Officer, Acme Industries (optional)",
    maxlength: "120"
  });
  titleInput.value = draft.title || "";
  titleInput.addEventListener("input", function(e){
    state.claimDraft = Object.assign({}, state.claimDraft || {}, { title: e.target.value });
  });

  return el("div", { class: "pad" }, [
    el("div", { class: "eyebrow" }, BRAND + " · " + TAGLINE + " · Certificate of Completion"),
    el("hr", { class: "rule-accent", style: { marginTop: "10px" } }),
    el("h2", { class: "display", style: { fontSize: "30px", margin: "0 0 8px 0" } }, "Claim your certificate"),
    el("p", { style: { color: "var(--ink-2)", margin: "0 0 28px 0", maxWidth: "560px" } },
      "Enter your name as you would like it to appear on the certificate. Title and firm are optional and will appear beneath your name."),
    el("div", { class: "claim-form" }, [
      el("div", { class: "claim-field" }, [
        el("label", { class: "claim-label" }, "Recipient name"),
        nameInput
      ]),
      el("div", { class: "claim-field" }, [
        el("label", { class: "claim-label" }, "Title and firm  ·  optional"),
        titleInput
      ]),
      el("div", { style: { display: "flex", gap: "12px", marginTop: "28px" } }, [
        el("button", { class: "btn btn-gold", onclick: issueCertificate }, "Issue certificate →"),
        el("button", { class: "btn btn-ghost", onclick: function(){ setState({ screen: "index" }); } }, "Back to index")
      ]),
      el("p", { class: "eyebrow", style: { marginTop: "20px", color: "var(--ink-3)" } }, "You may return and re-issue the certificate at any time")
    ])
  ]);
}

function renderCertificate() {
  const desc = "an eleven-module program on the strategy, architecture, economics, governance, and operationalization of agentic AI in 2026.";
  const certId = certificateId(state.recipientName, state.issuedDate);

  const frame = el("div", { class: "cert-frame" },
    el("div", { class: "cert-band" },
      el("div", { class: "cert-inner" }, [
        el("div", { class: "cert-corner tl" }),
        el("div", { class: "cert-corner tr" }),
        el("div", { class: "cert-corner bl" }),
        el("div", { class: "cert-corner br" }),

        el("div", { class: "cert-top" }, [
          el("div", { class: "cert-monogram" }, "U"),
          el("div", { class: "cert-academy" }, BRAND),
          el("div", { class: "cert-tagline" }, TAGLINE),
          el("div", { class: "cert-academy-rule" })
        ]),

        el("div", { class: "cert-mid" }, [
          el("div", { class: "cert-this-certifies" }, "By the authority of " + BRAND + ",  this is to certify that"),
          el("div", { class: "cert-name" }, state.recipientName || "—"),
          state.recipientTitle ? el("div", { class: "cert-title-line" }, state.recipientTitle) : el("div", { class: "cert-title-line" }, ""),
          el("div", { class: "cert-name-rule" }),
          el("div", { class: "cert-completed" }, "has successfully completed the program of study"),
          el("div", { class: "cert-program" }, PROGRAM_TITLE),
          el("div", { class: "cert-desc" }, desc),
          el("div", { class: "cert-flourish" }, "✦ ✦ ✦")
        ]),

        el("div", { class: "cert-foot" }, [
          el("div", { class: "cert-foot-col left" }, [
            el("div", { class: "cert-foot-rule" }),
            el("div", { class: "cert-foot-label" }, "Issued"),
            el("div", { class: "cert-foot-value" }, formatFormalDate(state.issuedDate)),
            el("div", { class: "cert-id" }, "Certificate № " + certId)
          ]),
          el("div", { class: "cert-foot-col" }, [
            el("div", { class: "cert-seal" },
              el("div", { class: "cert-seal-inner" }, [
                el("div", { class: "cert-seal-brand" }, BRAND),
                el("div", { class: "cert-seal-year" }, toRoman(new Date(state.issuedDate || Date.now()).getFullYear()))
              ])
            )
          ]),
          el("div", { class: "cert-foot-col right" }, [
            el("div", { class: "cert-signature" }, FOUNDER),
            el("div", { class: "cert-foot-rule" }),
            el("div", { class: "cert-foot-label" }, "Founder · " + BRAND)
          ])
        ])
      ])
    )
  );

  return el("div", { class: "cert-screen" }, [
    frame,
    el("div", { class: "cert-actions" }, [
      el("button", { class: "btn-text", onclick: function(){ setState({ screen: "index" }); } }, "← Back to index"),
      el("div", { style: { display: "flex", gap: "10px" } }, [
        el("button", { class: "btn btn-ghost", onclick: function(){ setState({ screen: "claim", claimDraft: { name: state.recipientName, title: state.recipientTitle } }); } }, "Edit details"),
        el("button", { class: "btn", onclick: function(){ window.print(); } }, "Print or save as PDF")
      ])
    ])
  ]);
}

function renderSessionScreen() {
  const mod = MODULES[state.activeModuleIdx];
  if (!mod) { setState({ screen: "index" }); return el("div"); }
  const session = mod.sessions[state.activeSessionIdx];

  const head = el("div", { class: "quest-head" }, [
    el("div", { class: "crumb" }, [
      el("button", { class: "btn-text", onclick: function(){ setState({ screen: "index" }); }, style: { marginRight: "16px" } }, "← Index"),
      document.createTextNode("Module " + ROMAN[state.activeModuleIdx] + " · "),
      el("b", null, mod.title)
    ]),
    el("div", null, [
      el("span", { class: "pill" }, "Session " + (state.activeSessionIdx + 1) + " / " + mod.sessions.length)
    ])
  ]);

  const body = el("div", { class: "pad" }, [
    el("div", { class: "eyebrow" }, mod.eyebrow + " · Session " + ROMAN[state.activeSessionIdx]),
    el("hr", { class: "rule-accent", style: { marginTop: "10px" } }),
    el("h2", { class: "display", style: { fontSize: "28px", margin: "0 0 24px 0", lineHeight: 1.2 } }, session.title),
    renderSessionView(session, completeSession)
  ]);

  return el("div", null, [head, body]);
}

/* --------------- RENDER --------------- */
function render() {
  $app.innerHTML = "";
  if (state.screen === "title")        $app.appendChild(renderTitle());
  else if (state.screen === "index")   $app.appendChild(renderIndex());
  else if (state.screen === "session") $app.appendChild(renderSessionScreen());
  else if (state.screen === "claim")   $app.appendChild(renderClaim());
  else if (state.screen === "certificate") $app.appendChild(renderCertificate());
  else $app.appendChild(renderTitle());
}

render();
</script>
