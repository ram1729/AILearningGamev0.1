<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Frontier AI Briefing — Executive Program (May 2026)</title>
<style>
  :root {
    --bg:        #F6F3EC;
    --surface:   #FFFFFF;
    --ink:       #0E1A2B;
    --ink-2:     #4B4B4B;
    --ink-3:     #8A8378;
    --line:      #E1DDD3;
    --line-2:    #EFEBE2;
    --accent:    #1A3A6E;
    --accent-2:  #E8EDF5;
    --gold:      #A6803E;
    --success:   #2C5F3F;
    --success-bg:#EBF1EC;
    --error:     #7C2D29;
    --error-bg:  #F5E9E8;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::selection { background: var(--accent); color: #fff; }

  .topbar {
    background: var(--ink);
    color: #fff;
    padding: 10px 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .topbar .gold { color: #D7B88A; }

  #app {
    max-width: 920px;
    margin: 0 auto;
    background: var(--surface);
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    min-height: calc(100vh - 36px - 60px);
  }

  /* Editorial primitives */
  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-3);
    font-weight: 600;
  }
  .serif { font-family: var(--serif); font-weight: 400; }
  .display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .rule {
    height: 1px; background: var(--line); border: 0; margin: 20px 0;
  }
  .rule-thin { height: 1px; background: var(--line-2); border: 0; margin: 14px 0; }
  .rule-accent {
    height: 2px; width: 36px; background: var(--ink); border: 0; margin: 0 0 18px 0;
  }

  /* Buttons */
  button { font: inherit; color: inherit; cursor: pointer; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 22px;
    border-radius: 2px;
    border: 1px solid var(--ink);
    background: var(--ink); color: #fff;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
    cursor: pointer; transition: background .15s, color .15s, border-color .15s;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
  }
  .btn-ghost:hover { border-color: var(--ink); background: transparent; color: var(--ink); }
  .btn-text {
    background: transparent; border: 0; padding: 6px 0;
    color: var(--ink-2); font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
  }
  .btn-text:hover { color: var(--accent); }

  /* Pills */
  .pill {
    display: inline-block;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px;
    background: var(--accent-2); color: var(--accent);
    font-weight: 600;
  }
  .pill-muted { background: var(--line-2); color: var(--ink-2); }
  .pill-success { background: var(--success-bg); color: var(--success); }
  .pill-gold { background: rgba(166,128,62,0.10); color: var(--gold); }

  /* Cards / option rows */
  .opt {
    width: 100%; text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    padding: 16px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14.5px;
  }
  .opt:hover { border-color: var(--ink-2); border-left-color: var(--ink); }
  .opt.is-selected { border-left-color: var(--accent); background: #FBFAF6; }
  .opt.is-correct { border-left-color: var(--success); background: var(--success-bg); }
  .opt.is-wrong   { border-left-color: var(--error);   background: var(--error-bg); }
  .opt .opt-num {
    font-family: var(--serif);
    color: var(--ink-3);
    font-size: 12px;
    letter-spacing: 0.12em;
    margin-right: 12px;
  }

  .feedback {
    border-left: 3px solid var(--ink);
    padding: 14px 18px;
    background: #FBFAF6;
    margin-top: 18px;
    font-size: 14px;
    line-height: 1.65;
  }
  .feedback.is-correct { border-left-color: var(--success); background: var(--success-bg); color: #1F3F2A; }
  .feedback.is-wrong   { border-left-color: var(--error);   background: var(--error-bg);   color: #4A1A17; }
  .feedback .label {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 6px; display: block;
  }

  /* Module index rows */
  .mod-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 18px; align-items: center;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s;
  }
  .mod-row:hover { background: #FBFAF6; }
  .mod-row.is-locked { cursor: not-allowed; opacity: 0.45; }
  .mod-row.is-locked:hover { background: transparent; }
  .mod-row .mod-num {
    font-family: var(--serif);
    font-size: 30px;
    color: var(--ink);
    font-weight: 400;
    line-height: 1;
  }
  .mod-row .mod-title {
    font-family: var(--serif);
    font-size: 21px;
    color: var(--ink);
    line-height: 1.25;
    margin: 0 0 4px 0;
    letter-spacing: -0.005em;
  }
  .mod-row .mod-sub {
    font-size: 13px;
    color: var(--ink-2);
  }
  .mod-row .mod-meta {
    text-align: right;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Match grid */
  .match-grid {
    display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px;
  }
  .match-col-label {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 10px;
  }
  .match-item {
    display: block; width: 100%; text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--line);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 13.5px;
    transition: all .15s;
    color: var(--ink);
  }
  .match-item:hover { border-color: var(--ink-2); }
  .match-item.is-active { border-left-color: var(--accent); background: var(--accent-2); }
  .match-item.is-done { border-left-color: var(--success); background: var(--success-bg); color: var(--success); cursor: default; }
  .match-mono {
    display: inline-block; width: 22px; height: 22px;
    border: 1px solid var(--ink); border-radius: 50%;
    text-align: center; line-height: 20px;
    font-family: var(--serif); font-size: 12px;
    margin-right: 10px; vertical-align: middle;
    color: var(--ink); background: transparent;
  }
  .match-item.is-done .match-mono { border-color: var(--success); color: var(--success); }

  /* Compare cards */
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .compare-card {
    border: 1px solid var(--line);
    border-top: 3px solid var(--line);
    padding: 18px 18px 20px;
    border-radius: 2px;
    background: var(--surface);
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    color: var(--ink);
  }
  .compare-card:hover { border-color: var(--ink-2); }
  .compare-card.is-correct { border-top-color: var(--success); background: var(--success-bg); }
  .compare-card.is-wrong   { border-top-color: var(--error);   background: var(--error-bg); }
  .compare-card .opt-tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 10px;
  }
  .compare-card .body { font-family: var(--serif); font-size: 15px; line-height: 1.55; color: var(--ink); }

  /* Scenario quote */
  .scenario {
    border-left: 3px solid var(--gold);
    padding: 12px 18px;
    background: #FBF7EE;
    font-family: var(--serif);
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    line-height: 1.6;
    margin: 18px 0;
  }

  /* Technique list */
  .tech-row {
    border-bottom: 1px solid var(--line);
    padding: 18px 0;
    cursor: pointer;
    transition: background .15s;
  }
  .tech-row:hover { background: #FBFAF6; }
  .tech-row.is-open { cursor: default; }
  .tech-row .tech-head {
    display: flex; align-items: baseline; gap: 14px;
  }
  .tech-row .tech-num {
    font-family: var(--serif); color: var(--ink-3); font-size: 13px;
    letter-spacing: 0.1em; min-width: 28px;
  }
  .tech-row .tech-title {
    font-family: var(--serif); font-size: 18px; color: var(--ink); flex: 1;
  }
  .tech-row .tech-tap {
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);
  }
  .tech-row .tech-body { padding-top: 12px; padding-left: 42px; }
  .tech-row .tech-example {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; color: var(--accent);
    background: #FBFAF6; border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 2px; margin-bottom: 10px;
    line-height: 1.55;
  }
  .tech-row .tech-why { font-size: 14px; color: var(--ink-2); line-height: 1.6; }

  /* Boss issues */
  .issue {
    padding: 10px 14px; border: 1px solid var(--error); border-left-width: 3px;
    background: var(--error-bg); color: var(--error);
    border-radius: 2px; margin-bottom: 8px; font-size: 13.5px;
  }
  .fixed {
    padding: 14px 18px; border: 1px solid var(--success); border-left-width: 3px;
    background: var(--success-bg); color: #1F3F2A;
    border-radius: 2px;
    font-family: var(--serif); font-size: 15px; line-height: 1.6;
  }

  /* Build grid */
  .build-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .build-card {
    border: 1px solid var(--line);
    padding: 18px 18px;
    border-radius: 2px;
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    color: var(--ink);
  }
  .build-card:hover { border-color: var(--ink-2); }
  .build-card.is-selected { border-color: var(--accent); border-left: 3px solid var(--accent); background: #FBFAF6; }
  .build-card .build-tier {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-bottom: 8px;
  }
  .build-card .build-name { font-family: var(--serif); font-size: 16px; color: var(--ink); margin-bottom: 6px; }
  .build-card .build-tool { font-size: 12px; color: var(--ink-2); }

  /* Prompt improve textarea */
  textarea.prompt-input {
    width: 100%; min-height: 110px;
    border: 1px solid var(--line); border-radius: 2px;
    padding: 12px 14px;
    font-family: var(--serif); font-size: 14.5px; line-height: 1.55;
    color: var(--ink); background: var(--surface);
    resize: vertical;
  }
  textarea.prompt-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  /* Header / footer / progress */
  .pad { padding: 36px 48px; }
  .pad-tight { padding: 24px 48px; }
  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 14px 48px;
    background: #FBFAF6;
  }
  .progress-row .stat .num { font-family: var(--serif); font-size: 22px; color: var(--ink); line-height: 1; }
  .progress-row .stat .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; font-weight: 700; }
  .progress-bar {
    flex: 1; max-width: 280px; margin: 0 24px;
    height: 4px; background: var(--line); border-radius: 0; overflow: hidden;
  }
  .progress-bar .fill { height: 100%; background: var(--ink); transition: width .6s ease; }

  /* Toast */
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff;
    padding: 12px 24px; border-radius: 2px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    z-index: 100;
    animation: pop .35s ease;
    box-shadow: 0 8px 24px rgba(14,26,43,.25);
  }
  @keyframes pop { from { transform: translate(-50%, -8px); opacity: 0;} to {transform: translate(-50%, 0); opacity: 1;} }

  /* Footer */
  .colophon {
    text-align: center; color: var(--ink-3);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 20px 14px;
  }
  .colophon a { color: var(--ink-2); text-decoration: none; border-bottom: 1px solid var(--line); padding-bottom: 1px; }
  .colophon a:hover { color: var(--ink); border-bottom-color: var(--ink); }

  /* Provider list on title */
  .providers {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 28px;
    max-width: 540px; margin: 28px auto 0;
  }
  .providers .p {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-top: 1px solid var(--line);
  }
  .providers .p:nth-child(2n) { border-top: 1px solid var(--line); }
  .providers .mono {
    width: 28px; height: 28px; border: 1px solid var(--ink); border-radius: 50%;
    text-align: center; line-height: 26px;
    font-family: var(--serif); font-size: 14px; color: var(--ink);
  }
  .providers .label { text-align: left; }
  .providers .name { font-family: var(--serif); font-size: 14px; color: var(--ink); line-height: 1.2; }
  .providers .desc { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; }

  /* Quest header */
  .quest-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 48px;
    border-bottom: 1px solid var(--line);
    background: #FBFAF6;
  }
  .quest-head .crumb { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .quest-head .crumb b { color: var(--ink); font-weight: 600; }

  /* Faculty note (story) */
  .faculty {
    font-family: var(--serif);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    border-left: 2px solid var(--line);
    padding-left: 18px;
    margin: 0 0 22px 0;
  }
  .faculty:before {
    content: "Scenario";
    display: block;
    font-family: var(--sans);
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 700; margin-bottom: 6px;
  }

  .question-line {
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.45;
    color: var(--ink);
    margin: 0 0 18px 0;
    letter-spacing: -0.005em;
  }

  /* Distinctions */
  .distinctions { display: flex; gap: 8px; flex-wrap: wrap; }

  @media (max-width: 700px) {
    .pad, .pad-tight { padding: 24px 22px; }
    .progress-row, .quest-head { padding: 14px 22px; }
    .compare-grid, .build-grid, .match-grid { grid-template-columns: 1fr; }
    .progress-bar { display: none; }
  }
</style>
</head>

/* --------------- STATE / PERSISTENCE --------------- */
const STORAGE_KEY = "execAI.brief.v1";
const TOTAL_SESSIONS = MODULES.reduce(function(a, m){ return a + m.sessions.length; }, 0);

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      completedModules: state.completedModules,
      completedSessions: state.completedSessions,
      distinctions: state.distinctions
    }));
  } catch (_) {}
}
function freshState() {
  return {
    screen: "title",
    completedModules: [],
    completedSessions: [],
    distinctions: [],
    activeModuleIdx: null,
    activeSessionIdx: 0,
    showToast: null,
    transient: {}
  };
}
const state = (function(){
  const fresh = freshState();
  const saved = loadState();
  if (saved) Object.assign(fresh, saved);
  return fresh;
})();

function setState(patch) { Object.assign(state, patch); saveState(); render(); }
function setTransient(id, patch) {
  state.transient[id] = Object.assign({}, state.transient[id] || {}, patch);
  render();
}
function getTransient(id) { return state.transient[id] || {}; }

function resetProgress() {
  if (!confirm("Reset all program progress? Distinctions and completion records will be cleared.")) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  Object.assign(state, freshState());
  render();
}

/* --------------- DOM HELPER --------------- */
const $app = document.getElementById("app");
function el(tag, attrs, children) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null || v === false) continue;
    if (k === "style" && typeof v === "object") Object.assign(n.style, v);
    else if (k === "class") n.className = v;
    else if (k.startsWith("on") && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "disabled") { if (v) n.setAttribute("disabled", ""); }
    else n.setAttribute(k, v);
  }
  if (children != null) {
    const arr = Array.isArray(children) ? children : [children];
    for (const c of arr) {
      if (c == null || c === false) continue;
      n.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(String(c)) : c);
    }
  }
  return n;
}

/* --------------- SESSION RENDERERS --------------- */
function r_choice(session, onComplete) {
  const t = getTransient(session.id);
  const sel = t.selected;
  const submitted = t.submitted;
  const correct = sel != null && session.options[sel].correct;

  const opts = session.options.map(function(opt, i){
    let cls = "opt";
    if (sel === i && !submitted) cls += " is-selected";
    if (submitted && sel === i) cls += opt.correct ? " is-correct" : " is-wrong";
    return el("button", {
      class: cls,
      onclick: function(){ if (!submitted) setTransient(session.id, { selected: i }); }
    }, [
      el("span", { class: "opt-num" }, TWO(i + 1)),
      document.createTextNode(opt.text)
    ]);
  });

  const children = [
    el("p", { class: "faculty" }, session.story),
    el("p", { class: "question-line" }, session.question),
    el("div", { style: { display: "flex", flexDirection: "column", gap: "8px" } }, opts)
  ];

  if (submitted && sel != null) {
    const fb = el("div", { class: "feedback " + (correct ? "is-correct" : "is-wrong") }, [
      el("span", { class: "label" }, correct ? "Faculty note · correct" : "Faculty note"),
      document.createTextNode(session.options[sel].feedback)
    ]);
    children.push(fb);
  }

  const actions = el("div", { style: { marginTop: "20px", display: "flex", gap: "12px" } });
  if (!submitted) {
    actions.appendChild(el("button", {
      class: "btn",
      onclick: function(){ if (sel != null) setTransient(session.id, { submitted: true }); },
      disabled: sel == null
    }, "Submit response →"));
  } else {
    actions.appendChild(el("button", { class: "btn", onclick: onComplete }, "Continue →"));
  }
  children.push(actions);
  return el("div", null, children);
}

function r_compare(session, onComplete) {
  const t = getTransient(session.id);
  const chosen = t.chosen;
  const correct = chosen === session.correctChoice;

  const card = function(k){
    const text = k === "A" ? session.optionA : session.optionB;
    let cls = "compare-card";
    if (chosen === k) cls += correct ? " is-correct" : " is-wrong";
    return el("button", { class: cls, onclick: function(){ setTransient(session.id, { chosen: k }); } }, [
      el("div", { class: "opt-tag" }, "Inquiry " + k),
      el("div", { class: "body" }, text)
    ]);
  };

  const children = [
    el("p", { class: "faculty" }, session.story),
    el("p", { class: "question-line" }, session.question),
    el("div", { class: "compare-grid", style: { marginBottom: "16px" } }, [card("A"), card("B")])
  ];
  if (chosen) {
    children.push(el("div", { class: "feedback " + (correct ? "is-correct" : "is-wrong") }, [
      el("span", { class: "label" }, correct ? "Faculty note · correct" : "Faculty note"),
      document.createTextNode(session.feedback)
    ]));
    children.push(el("div", { style: { marginTop: "20px" } },
      el("button", { class: "btn", onclick: onComplete }, "Continue →")
    ));
  }
  return el("div", null, children);
}

function r_learn(session, onComplete) {
  const t = getTransient(session.id);
  const revealed = t.revealed || [];
  const all = revealed.length === session.techniques.length;

  const items = session.techniques.map(function(tech, i){
    const open = revealed.indexOf(i) !== -1;
    return el("div", {
      class: "tech-row" + (open ? " is-open" : ""),
      onclick: function(){ if (!open) setTransient(session.id, { revealed: revealed.concat([i]) }); }
    }, [
      el("div", { class: "tech-head" }, [
        el("span", { class: "tech-num" }, TWO(i + 1)),
        el("span", { class: "tech-title" }, tech.name),
        el("span", { class: "tech-tap" }, open ? "" : "Reveal +")

      open ? el("div", { class: "tech-body" }, [
        el("div", { class: "tech-example" }, tech.example),
        el("div", { class: "tech-why" }, tech.why)

  const children = [

    el("div", { style: { marginBottom: "20px" } }, items)

function r_match(session, onComplete) {
  const t = getTransient(session.id);
  const matched = t.matched || {};
  const sel = t.selected || null;
  const all = Object.keys(matched).length === session.pairs.length;

  const handleA = function(ally){ if (matched[ally]) return; setTransient(session.id, { selected: ally }); };
  const handleS = function(strength){
    if (!sel) return;
    const ok = (session.pairs.find(function(p){ return p.ally === sel; }) || {}).strength === strength;
    if (ok) {
      const next = Object.assign({}, matched); next[sel] = strength;
      setTransient(session.id, { matched: next, selected: null });
    } else {
      setTransient(session.id, { selected: null });
    }
  };

  const allyCol = el("div", null, [
    el("div", { class: "match-col-label" }, "Provider"),
  ].concat(session.pairs.map(function(p){
    const done = !!matched[p.ally];
    let cls = "match-item";
    if (sel === p.ally) cls += " is-active";
    if (done) cls += " is-done";
    return el("button", { class: cls, onclick: function(){ handleA(p.ally); } }, [
      el("span", { class: "match-mono" }, p.mono),
      document.createTextNode(p.ally + (done ? "  ·  matched" : ""))
    ]);
  })));

  const strCol = el("div", null, [
    el("div", { class: "match-col-label" }, "May 2026 Flagship & Positioning")
  ].concat(session.pairs.map(function(p){
    const done = Object.keys(matched).some(function(k){ return matched[k] === p.strength; });
    let cls = "match-item" + (done ? " is-done" : "");
    return el("button", { class: cls, onclick: function(){ handleS(p.strength); } }, p.strength + (done ? "  ·  matched" : ""));
  })));

  const children = [
    el("p", { class: "faculty" }, session.story),
    el("p", { class: "question-line" }, session.question),
    el("div", { class: "match-grid" }, [allyCol, strCol])
  ];
  if (sel) children.push(el("p", { class: "eyebrow", style: { marginTop: "12px" } }, "Now select the matching positioning for " + sel));
  if (all) children.push(el("div", { style: { marginTop: "20px" } },
    el("button", { class: "btn", onclick: onComplete }, "Continue →")
  ));
  return el("div", null, children);
}

    ]));
    children.push(el("div", { style: { marginTop: "20px" } },
      el("button", { class: "btn", onclick: onComplete }, "Continue →")
    ));
  }
  return el("div", null, children);
}

function renderSessionView(session, onComplete) {
  switch (session.type) {
    case "choice":         return r_choice(session, onComplete);
    case "compare":        return r_compare(session, onComplete);
    case "learn":          return r_learn(session, onComplete);
    case "colosseum":      return r_colosseum(session, onComplete);
    case "boss":           return r_boss(session, onComplete);
    case "build":          return r_build(session, onComplete);
    case "match":          return r_match(session, onComplete);
    case "prompt_improve": return r_prompt_improve(session, onComplete);
    default:               return el("div", null, "Unknown session type");
  }
}

/* --------------- GAME LOGIC --------------- */
function enterModule(idx) {
  if (idx > 0 && state.completedModules.indexOf(idx - 1) === -1) return;
  setState({ activeModuleIdx: idx, activeSessionIdx: 0, screen: "session" });
}

function completeSession() {
  const mod = MODULES[state.activeModuleIdx];
  const session = mod.sessions[state.activeSessionIdx];
  if (state.completedSessions.indexOf(session.id) === -1) {
    state.completedSessions.push(session.id);
  }
  delete state.transient[session.id];

  if (state.activeSessionIdx < mod.sessions.length - 1) {
    setState({ activeSessionIdx: state.activeSessionIdx + 1 });
  } else {
    if (state.completedModules.indexOf(state.activeModuleIdx) === -1) {
      state.completedModules.push(state.activeModuleIdx);
      const dist = mod.distinction;
      if (dist && state.distinctions.indexOf(dist) === -1) state.distinctions.push(dist);
      state.showToast = mod.title + " — module complete";
      setTimeout(function(){ state.showToast = null; render(); }, 2400);
    }
    setState({ screen: "index" });
  }
}

/* --------------- SCREENS --------------- */
function renderTitle() {
  const continuing = state.completedSessions.length > 0;

  const providers = el("div", { class: "providers" },
    PROVIDERS.map(function(p){
      return el("div", { class: "p" }, [
        el("div", { class: "mono" }, p.mono),
        el("div", { class: "label" }, [
          el("div", { class: "name" }, p.name),
          el("div", { class: "desc" }, p.desc)
        ])
      ]);
    })
  );

  return el("div", { class: "pad", style: { textAlign: "center", paddingTop: "64px", paddingBottom: "64px" } }, [
    el("div", { class: "eyebrow" }, "Executive Program · May 2026"),
    el("hr", { class: "rule-accent", style: { margin: "16px auto 24px" } }),
    el("h1", { class: "display", style: { fontSize: "44px", margin: "0 0 12px 0", lineHeight: 1.15 } }, "The Frontier AI Briefing"),
    el("p", { style: { fontSize: "16px", color: "var(--ink-2)", maxWidth: "560px", margin: "0 auto 8px", lineHeight: 1.6 } },
      "A six-module program for senior leaders on the strategic, technical, and operational landscape of agentic AI."),
    el("p", { class: "eyebrow", style: { marginTop: "20px" } }, "Featuring · Opus 4.7 · GPT-5.5 · Gemini 3.1 Pro · Copilot"),
    providers,
    el("div", { style: { marginTop: "40px", display: "flex", justifyContent: "center", gap: "12px" } }, [
      el("button", { class: "btn", onclick: function(){ setState({ screen: "index" }); } },
        continuing ? "Resume program →" : "Begin program →")
    ]),
    el("p", { class: "eyebrow", style: { marginTop: "32px", color: "var(--ink-3)" } },
      continuing ? (state.completedSessions.length + " of " + TOTAL_SESSIONS + " sessions complete") : "Approximately 25 minutes · self-paced")
  ]);
}

function renderIndex() {
  const container = el("div", null);

  if (state.showToast) {
    container.appendChild(el("div", { class: "toast" }, state.showToast));
  }

  // Progress bar
  const pct = Math.round((state.completedSessions.length / TOTAL_SESSIONS) * 100);
  const progress = el("div", { class: "progress-row" }, [
    el("div", { class: "stat" }, [
      el("div", { class: "num" }, state.completedModules.length + " / " + MODULES.length),
      el("div", { class: "lbl" }, "Modules complete")
    ]),
    el("div", { class: "progress-bar" }, el("div", { class: "fill", style: { width: pct + "%" } })),
    el("div", { class: "stat", style: { textAlign: "right" } }, [
      el("div", { class: "num" }, state.completedSessions.length + " / " + TOTAL_SESSIONS),
      el("div", { class: "lbl" }, "Sessions complete")
    ])
  ]);
  container.appendChild(progress);

  // Header
  container.appendChild(el("div", { class: "pad-tight", style: { paddingBottom: "8px" } }, [
    el("div", { class: "eyebrow" }, "Program Index · Six Modules"),
    el("hr", { class: "rule-accent", style: { marginTop: "10px" } }),
    el("h2", { class: "display", style: { fontSize: "26px", margin: "0 0 6px 0" } }, "The Frontier AI Briefing"),
    el("p", { style: { color: "var(--ink-2)", margin: 0, fontSize: "14px" } },
      "Each module contains one or two sessions. Complete a module to unlock the next.")
  ]));

  // Module list
  const list = el("div", { class: "pad-tight", style: { paddingTop: "12px", paddingBottom: "12px" } });
  MODULES.forEach(function(m, i){
    const unlocked = i === 0 || state.completedModules.indexOf(i - 1) !== -1;
    const done = state.completedModules.indexOf(i) !== -1;
    const sessionsDone = m.sessions.filter(function(s){ return state.completedSessions.indexOf(s.id) !== -1; }).length;

    let metaPill;
    if (done) metaPill = el("span", { class: "pill pill-success" }, "Complete");
    else if (!unlocked) metaPill = el("span", { class: "pill pill-muted" }, "Locked");
    else if (sessionsDone > 0) metaPill = el("span", { class: "pill" }, "In progress");
    else metaPill = el("span", { class: "pill pill-muted" }, "Available");

    const row = el("div", {
      class: "mod-row" + (unlocked ? "" : " is-locked"),
      onclick: function(){ if (unlocked) enterModule(i); }
    }, [
      el("div", { class: "mod-num" }, ROMAN[i]),
      el("div", null, [
        el("div", { class: "mod-title" }, m.title),
        el("div", { class: "mod-sub" }, m.subtitle)
      ]),
      el("div", { class: "mod-meta" }, [
        metaPill,
        el("div", { style: { marginTop: "6px" } }, m.sessions.length + " session" + (m.sessions.length === 1 ? "" : "s"))
      ])
    ]);
    list.appendChild(row);
  });
  container.appendChild(list);

  // Distinctions
  if (state.distinctions.length > 0) {
    container.appendChild(el("div", { class: "pad-tight", style: { paddingTop: "16px" } }, [
      el("div", { class: "eyebrow" }, "Distinctions earned"),
      el("hr", { class: "rule-thin" }),
      el("div", { class: "distinctions" },
        state.distinctions.map(function(d){ return el("span", { class: "pill pill-gold" }, d); }))
    ]));
  }

  // Footer actions
  const allComplete = state.completedModules.length === MODULES.length;
  container.appendChild(el("div", { class: "pad-tight", style: { display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "1px solid var(--line)", marginTop: "8px" } }, [
    el("button", { class: "btn-text", onclick: function(){ setState({ screen: "title" }); } }, "← Title"),
    allComplete ? el("span", { class: "pill pill-gold" }, "Program complete · Capstone earned") : null,
    el("button", { class: "btn-text", onclick: resetProgress, style: { color: "var(--ink-3)" } }, "Reset")
  ]));

  return container;
}

function renderSessionScreen() {
  const mod = MODULES[state.activeModuleIdx];
  if (!mod) { setState({ screen: "index" }); return el("div"); }
  const session = mod.sessions[state.activeSessionIdx];

  const head = el("div", { class: "quest-head" }, [
    el("div", { class: "crumb" }, [
      el("button", { class: "btn-text", onclick: function(){ setState({ screen: "index" }); }, style: { marginRight: "16px" } }, "← Index"),
      document.createTextNode("Module " + ROMAN[state.activeModuleIdx] + " · "),
      el("b", null, mod.title)
    ]),
    el("div", null, [
      el("span", { class: "pill" }, "Session " + (state.activeSessionIdx + 1) + " / " + mod.sessions.length)
    ])
  ]);

  const body = el("div", { class: "pad" }, [
    el("div", { class: "eyebrow" }, mod.eyebrow + " · Session " + ROMAN[state.activeSessionIdx]),
    el("hr", { class: "rule-accent", style: { marginTop: "10px" } }),
    el("h2", { class: "display", style: { fontSize: "28px", margin: "0 0 24px 0", lineHeight: 1.2 } }, session.title),
    renderSessionView(session, completeSession)
  ]);

  return el("div", null, [head, body]);
}

/* --------------- RENDER --------------- */
function render() {
  $app.innerHTML = "";
  if (state.screen === "title")   $app.appendChild(renderTitle());
  else if (state.screen === "index")  $app.appendChild(renderIndex());
  else if (state.screen === "session") $app.appendChild(renderSessionScreen());
  else $app.appendChild(renderTitle());
}

render();
</script>
</body>
</html>
